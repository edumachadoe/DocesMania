<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Doces Mania</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #fff3e6, #ffe0cc);
    text-align: center;
}

/* TÍTULO */
h1 {
    margin-top: 80px;
    color: #8B4513;
    font-size: 42px;
}

p {
    color: #5c4033;
    font-size: 18px;
}

/* CONTAINER */
.container {
    margin-top: 50px;
}

/* CARD */
.card {
    display: inline-block;
    width: 220px;
    margin: 20px;
    padding: 25px;
    background-color: #ffffff;
    border-radius: 20px;
    box-shadow: 0px 8px 20px rgba(0,0,0,0.1);
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: scale(1.08);
    background-color: #ffd6e7;
}

a {
    text-decoration: none;
    color: #8B4513;
    font-weight: bold;
    font-size: 20px;
}

/* PARTE DE BAIXO */
.mais {
    margin-top: 80px;
}

.mais h2 {
    color: #8B4513;
    margin-bottom: 15px;
}

/* ÁREA DOS BOTÕES */
.botoes {
    display: flex;
    justify-content: center;
    gap: 15px;
}

/* BOTÃO SETA */
.botao-seta {
    font-size: 30px;
    background-color: #ff9966;
    color: white;
    border: none;
    border-radius: 50%;
    padding: 15px 20px;
    cursor: pointer;
    transition: 0.3s;
}

.botao-seta:hover {
    background-color: #ff7043;
    transform: scale(1.1);
}

/* BOTÃO LOGIN */
.botao-login {
    background-color: #8B4513;
    color: white;
    border: none;
    padding: 15px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.botao-login:hover {
    background-color: #a0522d;
}
</style>

</head>
<body>

<h1>🍰 Doces Mania</h1>
<p>Receitas deliciosas para adoçar seu dia!</p>

<div class="container">

    <a href="brownie.html">
        <div class="card">🍫 Brownie</div>
    </a>

    <a href="bolo.html">
        <div class="card">🎂 Bolo</div>
    </a>

    <a href="cookie.html">
        <div class="card">🍪 Cookie</div>
    </a>

</div>

<!-- PARTE DE BAIXO -->
<div class="mais">
    <h2>Ver mais receitas</h2>

    <div class="botoes">
        <button class="botao-seta">➜</button>
        <button class="botao-login" onclick="login()">🔐 Login</button>
    </div>
</div>

<script>
function login() {
    window.location.href = "login.html";
}
</script>

</body>
</html>
